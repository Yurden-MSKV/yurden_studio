{% load static %}
{% load main_filters %}

<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7/dist/htmx.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
    <link rel="stylesheet" href="{% static 'main_section/css/new_login.css' %}">
</head>
<body>
    <div class="main_container {% if request.is_mobile %}mobile{% else %}desktop{% endif %}">

    
        <div class="login_box">
            <h1>Вход в аккаунт</h1>
            
            {% if form.errors %}
                <div class="login-error">
                    {% for field, errors in form.errors.items reversed %}
                        {% for error in errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
            {% endif %}
            
            <form method="post" class="login_form">
                {% csrf_token %}

                <input type="hidden" name="next" value="{{ request.GET.next }}">
                
                <div class="input_block">
                    <label for="id_username">Никнейм</label>
                    <input type="text" name="username" class="form-control" id="id_username" value="{{ form.username.value|default_if_none:'' }}" required>
                </div>
                
                <div class="input_block">
                    <label for="id_password">Пароль</label>
                    <input type="password" name="password" class="form-control" id="id_password" value="{{ form.password.value|default_if_none:'' }}" required>
                </div>

               <div class="input_block captcha-block">
                    <div class="captcha-container">
                        {{ form.captcha }}
                    </div>
                    <label class="captcha-help">
                        Кликни на картинку для новой капчи
                    </label>
                </div>

                <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const captchaImg = document.querySelector('img.captcha');
                    if (!captchaImg) return;
                    
                    captchaImg.addEventListener('click', async function() {
                        const imgElement = this;
                        
                        imgElement.style.opacity = '0.7';
                        
                        try {
                            const response = await fetch('{% url "captcha-refresh" %}', {
                                headers: {
                                    'X-Requested-With': 'XMLHttpRequest'
                                }
                            });
                            
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            
                            const data = await response.json();
                            
                            const hiddenInput = document.querySelector('input[name="captcha_0"]');
                            if (hiddenInput && data.key) {
                                hiddenInput.value = data.key;
                            }
                            
                            const newImg = new Image();
                            
                            newImg.onload = function() {
                                imgElement.src = data.image_url + '?t=' + Date.now();
                                imgElement.style.opacity = '1';
                                
                                const textInput = document.querySelector('input[name="captcha_1"]');
                                if (textInput) {
                                    textInput.value = '';
                                    textInput.focus();
                                }
                            };
                            
                            newImg.onerror = function() {
                                imgElement.src = imgElement.src.split('?')[0] + '?t=' + Date.now();
                                imgElement.style.opacity = '1';
                            };
                            
                            newImg.src = data.image_url;
                            
                        } catch (error) {
                            console.error('Error refreshing captcha:', error);
                            
                            imgElement.src = imgElement.src.split('?')[0] + '?t=' + Date.now();
                            imgElement.style.opacity = '1';
                            
                            const textInput = document.querySelector('input[name="captcha_1"]');
                            if (textInput) {
                                textInput.value = '';
                            }
                        }
                    });
                    
                    captchaImg.style.cursor = 'pointer';
                });
                </script>
                
                <div class="btn_block">
                    <button class="login_btn" type="submit">Войти</button>
                </div>
            </form>

            <div class="another_action">
                <p>Нет аккаунта?<a href="{% url 'register' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    
    
    <script src="{% static 'js/theme.js' %}"></script>

</body>
</html>
