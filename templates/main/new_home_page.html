    <script>

        let pageNum = 1;
        let hasMore = true;
        let isLoading = false;
        const container = document.getElementById('home-container');
        const endMessage = document.getElementById('end-message');

        function checkNextPage() {
            let paginationData = document.getElementById(`pagination-data-${pageNum}`);
            if (paginationData) {
                const nextPage = paginationData.dataset.next;
                if (nextPage && nextPage !== '0' && nextPage !== 'None') {
                    pageNum = parseInt(nextPage);
                    hasMore = true;
                } else {
                    hasMore = false;
                    {#showEndMessage();#}
                }
                paginationData.remove();
            }
            return hasMore;
        }

        {#function showEndMessage() {#}
        {#    if (endMessage) {#}
        {#        endMessage.style.display = 'flex';#}
        {#    }#}
        {# }#}

        function loadFeed() {
            if (isLoading || !hasMore) {
                return;
            }
            console.log('Функция работает')
            isLoading = true;
            htmx.ajax(`GET`, `/home/?page=${pageNum}`, {
                target: `#home-container`,
                swap: `beforeend`,
                headers: {'HX-Request': 'true'}
            }).then(() => {
                checkNextPage();
                if (!hasMore) {
                    {#showEndMessage();#}
                }
            }).finally(() => {
                isLoading = false;
            });
        }

        function checkAndLoad() {
            if (!hasMore || isLoading) {
                return;
            }
            const scrollPosition = container.scrollTop + container.clientHeight;
            const threshold = container.scrollHeight * 0.9;
            if (scrollPosition >= threshold) {
                loadFeed();
            }
        }

        let scrollTimeout = false;
        container.addEventListener('scroll', function() {
            if (!scrollTimeout) {
                requestAnimationFrame(() => {
                    checkAndLoad();
                    scrollTimeout = false;
                });
                scrollTimeout = true;
            }
        });

        setTimeout(() => {
            const initialPagination = document.getElementById(`pagination-data-${pageNum}`);
            if (initialPagination.dataset.next !== '0') {
                checkNextPage();
            } else {
                hasMore = false;
            }
            if (hasMore && container.scrollHeight <= container.clientHeight + 50) {
                loadFeed();
            }
            checkAndLoad();
        }, 100);

    </script>
