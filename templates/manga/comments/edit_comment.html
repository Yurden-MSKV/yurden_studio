<form id="comment-form-{{ comment.id }}"
      class="comment_form edit_form"
      hx-post="{% url 'edit-comment' comment.id %}"
      hx-target="#comment-{{ comment.id }}"
      hx-swap="outerHTML"
      hx-trigger="submit">
    {% csrf_token %}
    {{ form.text }}
    <div class="send_comment_block">
    <input type="submit" class="send_comment" value="Отправить">
    </div>
</form>
