{% load static %}

{% block post_comments_block %}
    <div class="form_block">
        <form class="comment_form"
              hx-post="{% url 'find_post_comments' post_id %}"
              hx-target="#comments-container"
              hx-swap="innerHTML"
              hx-trigger="submit">
            {% csrf_token %}
            <textarea class="message_block" type="text" name="text" id="comment" placeholder="Твой комментарий" required></textarea>
            <div class="send_block">
                <input class="send_btn" type="submit" value="Отправить">
            </div>
        </form>
    </div>
    <div class="comments_block" id="comments_block">
        {% for comment in comments %}
            <div class="comment">
                <div class="user_date">
                    <div class="user">
                        <img class="icon post_profile_icon" src="{% static 'icons/user-solid-full.svg' %}">
                        <h4>{{ comment.author }}</h4>
                    </div>
                    <div class="date">
                        <p>{{ comment.created_at }}</p>
                    </div>
                </div>
                <div class="comment_text">
                    <p>{{ comment.text }}</p>
                </div>
            </div>
        {% endfor %}
    </div>

    <script>
        document.querySelector('.comment_form')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'TEXTAREA') {
                if (!e.shiftKey) {
                    e.preventDefault();

                    // Для HTMX
                    if (typeof htmx !== 'undefined') {
                        htmx.trigger(this, 'submit');
                    } else {
                        this.submit();
                    }
                }
            }
        });
    </script>

{% endblock %}
