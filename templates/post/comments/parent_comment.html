{% load static %}

<div class="comment parent_link" id="parent-comment" data-parent_id="{{ comment.id }}">
    <div class="user_date">
        <div class="user">
            <div class="user_element">
                <img class="icon post_profile_icon" src="{% static 'icons/user-solid-full.svg' %}">
                <h4>{{ comment.author }}</h4>
            </div>
        </div>
        <div class="date">
            <p>{{ comment.created_at }}</p>
        </div>
    </div>
    <div class="comment_text">
        <p>{{ comment.text }}</p>
    </div>
</div>
